openapi: 3.0.0
info:
  title: Gaming Services Middleware WebHook API
  version: 0.0.1
  description: |-
    API for receiving publisher webhooks (for example AccelByte Gaming Services cohort transitions) and publishing them to internal messaging.

    ### Authenticating with `Xsolla-Signature`
    Protected routes require an HTTP header named **`Xsolla-Signature`**. The header value lets the service verify that you hold the **shared webhook secret** and that the **request body** you send is exactly what you signed.

    **What you send:** a single header value in this shape (comma between the two parts; spaces after the comma are fine):

    `t=<unix_seconds>,v1=<hex_hmac>`

    - **`<unix_seconds>`** — Unix time in **whole seconds** (integer), written in decimal **without** leading zeros on the number (e.g. `1625700981`). Use the same value everywhere in steps 1–3 below.
    - **`<hex_hmac>`** — **64** lowercase **hex** characters (32 bytes): the output of HMAC-SHA256 from step 3.

    **How to build it (do this in order):**
    1. **Finalize the body** you will send (e.g. JSON UTF-8). Call the exact octet sequence **B** — no trailing newline unless your payload truly includes one.
    2. **Choose `t`** — the signing time as Unix seconds (typically “now”). The server rejects timestamps outside a configured skew window, so use a fresh clock.
    3. **Build the signing string** as raw bytes: the UTF-8/ASCII bytes of **t** written in decimal, then one ASCII dot **`.`** (byte `0x2E`), then **B** unchanged. Example: if `t` is `1625700981` and **B** is `{"a":1}`, the signing bytes are `1625700981.` followed by those JSON octets.
    4. Compute **HMAC-SHA256**( key = shared secret encoded as agreed with the operator — usually the UTF-8 bytes of the secret string — message = the signing bytes from step 3 ). Take the 32-byte digest and encode it as **lowercase hex**; that string is **`v1`**.
    5. Set the header: **`Xsolla-Signature: t=<t>,v1=<v1>`** using your decimal `t` and the hex from step 4.

    The shared secret is provided out of band. If your environment overrides the header name, use the name from your operator; otherwise use **`Xsolla-Signature`**.
tags:
  - name: Publisher Merchants
paths:
  /api/v1/publisher/merchants/sync:
    post:
      operationId: postPublisherMerchantsSync
      summary: Publish merchant cohort transition event to Kafka
      description: |-
        Accepts whitelist/blacklist transitions and publishes one sync event to Kafka.

        **Authentication:** Requires a valid `Xsolla-Signature` header on every request.
        Responds with **401** when the header is missing, malformed, outside the allowed timestamp window, or does not match the raw body and configured secret.
      parameters: []
      responses:
        '202':
          description: The request has been accepted for processing, but processing has not yet completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantSyncAcceptedResponse'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Publisher Merchants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantSyncRequest'
security:
  - WebhookSignature: []
components:
  schemas:
    APIError:
      type: object
      required:
        - code
        - description
      properties:
        code:
          type: string
          description: e.g. "gaming.bad_gateway"
        description:
          type: string
        causes:
          type: array
          items:
            $ref: '#/components/schemas/ErrorCause'
      description: |-
        Error code and human-readable description.
        Code format: {service_prefix}.{mnemonic_code}
    ErrorCause:
      type: object
      required:
        - param
        - value
      properties:
        param:
          type: string
        value:
          type: string
        description:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
        - request_id
      properties:
        error:
          $ref: '#/components/schemas/APIError'
        request_id:
          type: string
      description: |-
        Xsolla HTTP API Standard error envelope.
        All 4xx/5xx responses MUST use this structure.
    MerchantListTransition:
      type: object
      required:
        - previous
        - current
      properties:
        previous:
          type: array
          items:
            type: integer
        current:
          type: array
          items:
            type: integer
    MerchantSyncAcceptedResponse:
      type: object
      required:
        - eventId
      properties:
        eventId:
          type: string
    MerchantSyncRequest:
      type: object
      properties:
        merchantIdWhiteList:
          $ref: '#/components/schemas/MerchantListTransition'
        merchantIdBlackList:
          $ref: '#/components/schemas/MerchantListTransition'
  securitySchemes:
    WebhookSignature:
      type: apiKey
      in: header
      name: Xsolla-Signature
      description: |-
        Client-supplied HMAC webhook signature. See the top-level API description in this spec"><u>boom</u>
        (section *Authenticating with Xsolla-Signature*) for how to build the header value.
